<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Plugin Dashboard</title>
    <meta name="description" content="Autonomous SEO analysis plugin dashboard. Analyze, fix, and deploy SEO improvements for any website.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --bg-elevated: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.06);
            --primary: #34d399;
            --primary-hover: #10b981;
            --primary-glow: rgba(52, 211, 153, 0.15);
            --error: #f87171;
            --warning: #fbbf24;
            --radius: 16px;
            --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Dot pattern */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        /* Ambient glow */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(800px circle at var(--mx, 50%) var(--my, 50%), var(--primary-glow), transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Header ── */
        .header {
            padding: 48px 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #34d399, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .embed-btn {
            padding: 10px 20px;
            border-radius: 10px;
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.2);
            color: var(--primary);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .embed-btn:hover {
            background: rgba(52, 211, 153, 0.2);
            transform: translateY(-1px);
        }

        /* ── Cards ── */
        .card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 18px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #0f172a;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Forms ── */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.1);
        }

        .input::placeholder {
            color: rgba(148, 163, 184, 0.4);
        }

        .submit-btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #34d399, #10b981);
            color: #0f172a;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.35);
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.45);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 24px 0;
        }

        .section-label {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }

        /* ── Progress ── */
        .progress-area {
            margin-top: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 14px;
            border: 1px solid var(--border);
        }

        .progress-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 14px;
        }

        .progress-steps {
            list-style: none;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .progress-steps li {
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ── Results ── */
        .results-container { margin-top: 24px; }

        .score-section {
            text-align: center;
            padding: 30px;
            margin-bottom: 24px;
        }

        .score-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: white;
            margin: 0 auto 16px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .score-ring.good { background: linear-gradient(135deg, #34d399, #10b981); }
        .score-ring.average { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .score-ring.bad { background: linear-gradient(135deg, #f87171, #ef4444); }

        .result-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .result-card h4 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .issue-list {
            list-style: none;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .issue-list li {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .issue-list li::before {
            content: "⚠ ";
            color: var(--warning);
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 8px;
            font-size: 0.72rem;
            font-weight: 600;
            background: rgba(52, 211, 153, 0.12);
            color: var(--primary);
            margin-right: 8px;
        }

        /* ── Embed Modal ── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .modal h3 {
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .modal p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .code-block {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.82rem;
            color: var(--primary);
            overflow-x: auto;
            margin-bottom: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.primary {
            background: var(--primary);
            color: #0f172a;
        }

        .modal-btn.secondary {
            background: var(--border);
            color: var(--text);
        }

        .hidden { display: none !important; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .header h1 { font-size: 1.5rem; }
            .card { padding: 24px; }
            .header { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>SEO Plugin Dashboard</h1>
            <p class="header-subtitle">Analyze, optimize, and deploy SEO improvements</p>
        </div>
        <button class="embed-btn" id="embed-btn">📋 Get Embed Code</button>
    </div>

    <!-- Analysis Form Card -->
    <div class="card" id="form-card">
        <div class="tabs">
            <button class="tab-btn active" data-tab="standard-panel">Standard Analysis</button>
            <button class="tab-btn" data-tab="plugin-panel">Autonomous Plugin</button>
        </div>

        <!-- Standard Tab -->
        <div class="tab-panel active" id="standard-panel">
            <form id="standard-form">
                <div class="form-group">
                    <label>Target Domain</label>
                    <input type="text" class="input" name="domain" placeholder="https://example.com" required>
                </div>
                <div class="form-group">
                    <label>Crawl Limit (Pages)</label>
                    <input type="number" class="input" name="limit" value="50" min="1" required>
                </div>
                <button type="submit" class="submit-btn" id="standard-submit">Run Engine</button>
            </form>
        </div>

        <!-- Autonomous Tab -->
        <div class="tab-panel" id="plugin-panel">
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">
                Crawl, analyze, fix SEO loopholes, generate content for keyword gaps, and deploy.
            </p>
            <form id="plugin-form">
                <div class="form-group">
                    <label>Site URL</label>
                    <input type="text" class="input" name="site_url" placeholder="https://example.com" required>
                </div>
                <div class="form-group">
                    <label>Competitor Domains (comma separated)</label>
                    <input type="text" class="input" name="competitors" placeholder="competitor1.com, competitor2.com">
                </div>
                <div class="form-group">
                    <label>Crawl Limit</label>
                    <input type="number" class="input" name="limit" value="100" min="1" required>
                </div>
                <hr class="divider">
                <div class="section-label">AI Configuration</div>
                <div class="form-group">
                    <label>OpenAI API Key (Optional)</label>
                    <input type="password" class="input" name="openai_key" placeholder="sk-...">
                </div>
                <div class="form-group">
                    <label>Gemini API Key (Optional)</label>
                    <input type="password" class="input" name="gemini_key" placeholder="AIza...">
                </div>
                <div class="form-group">
                    <label>Ollama Host (Optional)</label>
                    <input type="text" class="input" name="ollama_host" placeholder="http://localhost:11434">
                </div>
                <button type="submit" class="submit-btn" id="plugin-submit">Run Autonomous Analysis</button>
            </form>
        </div>

        <!-- Progress (shared) -->
        <div class="progress-area hidden" id="progress-area">
            <div class="progress-title">Analysis in Progress</div>
            <ul class="progress-steps" id="progress-steps"></ul>
        </div>
    </div>

    <!-- Results Container -->
    <div class="results-container hidden" id="results-container"></div>
</div>

<!-- Embed Code Modal -->
<div class="modal-overlay" id="embed-modal">
    <div class="modal">
        <h3>Embed SEO Plugin</h3>
        <p>Add this single line to any webpage to enable the floating SEO analysis widget:</p>
        <div class="code-block" id="embed-code"></div>
        <div class="modal-actions">
            <button class="modal-btn secondary" id="modal-close">Close</button>
            <button class="modal-btn primary" id="modal-copy">Copy Code</button>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    const API = window.location.origin;

    // ── Mouse glow effect ──
    document.addEventListener('mousemove', e => {
        document.body.style.setProperty('--mx', e.clientX + 'px');
        document.body.style.setProperty('--my', e.clientY + 'px');
    });

    // ── Tab switching ──
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.add('active');

            // Reset state when switching
            document.getElementById('progress-area').classList.add('hidden');
            document.getElementById('progress-steps').innerHTML = '';
            document.getElementById('results-container').classList.add('hidden');
            document.getElementById('results-container').innerHTML = '';
        });
    });

    // ── Embed modal ──
    const embedBtn = document.getElementById('embed-btn');
    const embedModal = document.getElementById('embed-modal');
    const embedCode = document.getElementById('embed-code');
    const modalClose = document.getElementById('modal-close');
    const modalCopy = document.getElementById('modal-copy');

    embedBtn.addEventListener('click', () => {
        embedCode.textContent = `<script src="${API}/static/plugin.js" data-server="${API}"><\/script>`;
        embedModal.classList.add('show');
    });

    modalClose.addEventListener('click', () => embedModal.classList.remove('show'));
    embedModal.addEventListener('click', (e) => { if (e.target === embedModal) embedModal.classList.remove('show'); });

    modalCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(embedCode.textContent).then(() => {
            modalCopy.textContent = '✓ Copied!';
            setTimeout(() => modalCopy.textContent = 'Copy Code', 2000);
        });
    });

    // ── Form submission ──
    function handleSubmit(formId, endpoint, mode) {
        const form = document.getElementById(formId);
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = form.querySelector('.submit-btn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            const progressArea = document.getElementById('progress-area');
            const progressSteps = document.getElementById('progress-steps');
            const resultsContainer = document.getElementById('results-container');

            resultsContainer.classList.add('hidden');
            resultsContainer.innerHTML = '';
            progressSteps.innerHTML = '';
            progressArea.classList.remove('hidden');

            const taskId = Math.random().toString(36).substring(2, 15);
            const formData = new FormData(form);
            formData.append('task_id', taskId);

            let lastStatus = '';
            const pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${API}/progress?task_id=${taskId}`);
                    if (!res.ok) return;
                    const data = await res.json();
                    const status = data.status || 'Initializing...';

                    if (status === 'Unknown task' || !status) return;

                    if (data.state === 'error') {
                        clearInterval(pollInterval);
                        if (progressSteps.lastElementChild) {
                            progressSteps.lastElementChild.innerHTML = `<span style="color:var(--error)">✕</span> ${status}`;
                        }
                        btn.disabled = false;
                        btn.textContent = mode === 'standard' ? 'Run Engine' : 'Run Autonomous Analysis';
                        return;
                    }

                    if (status !== lastStatus) {
                        if (progressSteps.lastElementChild) {
                            progressSteps.lastElementChild.innerHTML = `<span style="color:var(--primary)">✓</span> ${lastStatus}`;
                        }
                        lastStatus = status;
                        const li = document.createElement('li');
                        li.innerHTML = `<span style="display:inline-block;animation:spin 1s linear infinite">⏳</span> ${status}`;
                        progressSteps.appendChild(li);
                    }

                    if (data.state === 'completed') {
                        clearInterval(pollInterval);
                        setTimeout(() => loadResults(taskId, mode, btn), 500);
                    }
                } catch (err) {}
            }, 1200);

            try {
                const res = await fetch(`${API}${endpoint}`, { method: 'POST', body: formData });
                if (!res.ok) {
                    clearInterval(pollInterval);
                    progressArea.classList.add('hidden');
                    const errData = await res.json().catch(() => ({}));
                    alert('Submission failed: ' + (errData.error || errData.message || 'Unknown error'));
                    btn.disabled = false;
                    btn.textContent = mode === 'standard' ? 'Run Engine' : 'Run Autonomous Analysis';
                }
            } catch (err) {
                clearInterval(pollInterval);
                progressArea.classList.add('hidden');
                alert('Network error');
                btn.disabled = false;
                btn.textContent = mode === 'standard' ? 'Run Engine' : 'Run Autonomous Analysis';
            }
        });
    }

    handleSubmit('standard-form', '/generate', 'standard');
    handleSubmit('plugin-form', '/plugin/run', 'plugin');

    // ── Load results ──
    async function loadResults(taskId, mode, btn) {
        const resultsContainer = document.getElementById('results-container');
        try {
            const res = await fetch(`${API}/api/results?task_id=${taskId}`);
            const data = await res.json();

            if (!data || data.error) {
                resultsContainer.innerHTML = `<div class="card"><h4 style="color:var(--error)">Error</h4><p style="color:var(--text-muted)">${data?.error || 'No results found'}</p></div>`;
                resultsContainer.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = mode === 'standard' ? 'Run Engine' : 'Run Autonomous Analysis';
                return;
            }

            const engineResult = data.engine_result || {};
            const score = data.seo_score_after || engineResult.seo_score || 0;
            const scoreClass = score >= 80 ? 'good' : score >= 50 ? 'average' : 'bad';
            const scoreLabel = score >= 80 ? 'Excellent Health' : score >= 50 ? 'Average Health' : 'Poor Health';

            let html = '';

            // Score card
            html += `
                <div class="card score-section">
                    <div class="score-ring ${scoreClass}">${Math.round(score)}</div>
                    <h3 style="color:var(--primary);margin-bottom:6px">${scoreLabel}</h3>
                    <p style="color:var(--text-muted);font-size:0.9rem">Site analysis completed. Score represents overall SEO optimization level.</p>
                </div>
            `;

            // Strategy
            if (engineResult.strategy) {
                html += `<div class="card"><div class="card-title">AI Strategy</div><p style="color:var(--text-muted);line-height:1.7">${engineResult.strategy}</p></div>`;
            }

            // Actions / fixes
            const actions = data.suggested_actions || engineResult.actions || [];
            if (actions.length > 0) {
                html += `<div class="card"><div class="card-title">Suggested Fixes (${actions.length})</div><ul class="issue-list">`;
                actions.slice(0, 20).forEach(a => {
                    html += `<li><span class="badge">${a.type || 'fix'}</span>${a.description || a.tag || a.fix_type || 'Apply SEO fix'}</li>`;
                });
                if (actions.length > 20) html += `<li style="list-style:none;color:var(--text-muted)">...and ${actions.length - 20} more</li>`;
                html += `</ul></div>`;
            }

            // Module issues
            const modules = engineResult.modules || {};
            const sections = [
                { key: 'meta', label: 'Meta Tag Issues' },
                { key: 'image_seo', label: 'Image SEO Issues' },
                { key: 'heading_structure', label: 'Heading Structure Issues' },
                { key: 'mobile_seo', label: 'Mobile SEO Issues' },
                { key: 'page_speed', label: 'Performance Issues' },
                { key: 'core_web_vitals', label: 'Core Web Vitals' },
                { key: 'broken_links', label: 'Broken Links' },
                { key: 'content_quality', label: 'Content Quality' }
            ];

            sections.forEach(sec => {
                const issues = (modules[sec.key] || {}).issues || [];
                if (issues.length > 0) {
                    html += `<div class="card"><div class="card-title">${sec.label} (${issues.length})</div><ul class="issue-list">`;
                    issues.slice(0, 8).forEach(iss => {
                        const text = typeof iss === 'string' ? iss : (iss.issue || iss.description || JSON.stringify(iss));
                        html += `<li>${text}</li>`;
                    });
                    if (issues.length > 8) html += `<li style="list-style:none;color:var(--text-muted)">...and ${issues.length - 8} more</li>`;
                    html += `</ul></div>`;
                }
            });

            // Full report link
            html += `<div class="card" style="text-align:center"><a href="${API}/results?task_id=${taskId}" target="_blank" style="color:var(--primary);font-weight:600;text-decoration:none;font-size:0.95rem">Open Full Report in Dashboard →</a></div>`;

            resultsContainer.innerHTML = html;
            resultsContainer.classList.remove('hidden');

        } catch (e) {
            resultsContainer.innerHTML = `<div class="card"><h4 style="color:var(--error)">Error Loading Results</h4><p style="color:var(--text-muted)">${e.message}</p></div>`;
            resultsContainer.classList.remove('hidden');
        }

        btn.disabled = false;
        btn.textContent = mode === 'standard' ? 'Run Engine' : 'Run Autonomous Analysis';
    }
})();
</script>
</body>
</html>
